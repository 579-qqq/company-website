{% extends "base.html" %}
{% block title %}垚博企管 - 在线考试{% endblock %}

{% block content %}
<!-- ===== 页面顶部 ===== -->
<section class="page-hero">
    <div class="container page-hero-content">
        <h1>在线考试</h1>
        <p>完成以下题目，提交后将自动评分并显示详细结果</p>
    </div>
</section>

<!-- ===== 考试区域 ===== -->
<section class="section" style="padding-top: 0;">
    <div class="container">
        <div class="exam-wrapper">

            <!-- 考试信息栏 -->
            <div class="exam-bar">
                <div class="exam-bar-item">
                    <label>考生姓名</label>
                    <input type="text" id="exam_taker" class="form-input" placeholder="请输入您的姓名" maxlength="20">
                </div>
                <div class="exam-stats" id="examStats" style="display:none;">
                    <span>抽 <strong id="totalCount">0</strong> 题 · 每题 2 分 · 满分 100 · <strong style="color:#c62828;">70 分合格</strong></span>
                    <br><small>已答 <strong id="answeredCount">0</strong> 题</small>
                </div>
                <div class="exam-bar-item" style="flex: 0 0 auto; min-width: auto;">
                    <button id="btn-start" class="btn btn-primary" onclick="loadQuestions()">
                        开始考试
                    </button>
                </div>
            </div>

            <!-- 加载动画 -->
            <div id="examLoading" class="loading" style="display:none;">
                <div class="spinner"></div>
                <p>正在加载试题...</p>
            </div>

            <!-- 考试主体 -->
            <div id="examArea" style="display:none;">

                <!-- 进度条 -->
                <div class="exam-progress">
                    <div class="progress-header">
                        <span>答题进度</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>

                <!-- 题目列表 -->
                <div id="questionList"></div>

                <!-- 提交 -->
                <div class="exam-footer" id="examActions">
                    <button class="btn btn-primary" onclick="submitExam()" style="min-width: 200px;">
                        提交答卷
                    </button>
                </div>
            </div>

            <!-- 成绩结果 -->
            <div id="examResult" style="display:none;"></div>

        </div>
    </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
let questions = [];
let userAnswers = {};

function loadQuestions() {
    const name = document.getElementById('exam_taker').value.trim();
    if (!name) {
        alert('请先输入您的姓名');
        document.getElementById('exam_taker').focus();
        return;
    }

    document.getElementById('examLoading').style.display = 'block';
    document.getElementById('examArea').style.display = 'none';
    document.getElementById('examResult').style.display = 'none';
    const btn = document.getElementById('btn-start');
    btn.disabled = true;
    btn.textContent = '加载中...';

    fetch('/api/exam/questions')
        .then(res => res.json())
        .then(data => {
            document.getElementById('examLoading').style.display = 'none';
            btn.disabled = false;

            if (data.success && data.questions.length > 0) {
                questions = data.questions;
                userAnswers = {};
                btn.textContent = '重新考试';
                renderQuestions();
                document.getElementById('examArea').style.display = 'block';
                document.getElementById('examStats').style.display = 'block';
                document.getElementById('totalCount').textContent = questions.length;
                updateProgress();
                document.getElementById('questionList').scrollIntoView({ behavior: 'smooth' });
            } else {
                btn.textContent = '开始考试';
                alert('暂无可用试题，请联系管理员');
            }
        })
        .catch(() => {
            document.getElementById('examLoading').style.display = 'none';
            btn.disabled = false;
            btn.textContent = '开始考试';
            alert('加载试题失败，请检查网络连接');
        });
}

function renderQuestions() {
    const container = document.getElementById('questionList');
    let html = '';
    questions.forEach((q, idx) => {
        const categoryCls = q.category === '基础知识' ? 'tag-basic' : 'tag-professional';
        html += `
            <div class="question-card" id="q-${q.id}">
                <div class="question-header">
                    <span class="question-number">${idx + 1}</span>
                    <span class="question-tag ${categoryCls}">${q.category}</span>
                    <span class="question-score">${q.score} 分</span>
                </div>
                <div class="question-content">${q.content}</div>
                <div class="question-options">
        `;
        q.options.forEach((opt, oi) => {
            const letter = String.fromCharCode(65 + oi);
            // 去除选项文本中的字母前缀（如 "A. " "A、" "A．"），避免和动态字母徽章重复
            const cleanOpt = opt.replace(/^[A-Z][.、．\s]+\s*/, '');
            const selected = userAnswers[q.id] === letter ? 'selected' : '';
            html += `
                <label class="option-item ${selected}" onclick="selectOption(${q.id}, '${letter}', this)">
                    <input type="radio" name="q_${q.id}" value="${letter}" ${userAnswers[q.id] === letter ? 'checked' : ''}>
                    <span class="option-letter">${letter}</span>
                    <span class="option-text">${cleanOpt}</span>
                </label>
            `;
        });
        html += `</div></div>`;
    });
    container.innerHTML = html;
}

function selectOption(qid, letter, el) {
    userAnswers[qid] = letter;
    document.querySelectorAll(`#q-${qid} .option-item`).forEach(item => item.classList.remove('selected'));
    el.classList.add('selected');
    el.querySelector('input[type="radio"]').checked = true;
    updateProgress();
}

function updateProgress() {
    const answered = Object.keys(userAnswers).length;
    const total = questions.length || 1;
    const pct = Math.round((answered / total) * 100);
    document.getElementById('answeredCount').textContent = answered;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPercent').textContent = pct + '%';
}

function submitExam() {
    const name = document.getElementById('exam_taker').value.trim();
    const answered = Object.keys(userAnswers).length;
    const total = questions.length;

    if (answered < total) {
        if (!confirm(`您还有 ${total - answered} 题未作答，确定提交吗？`)) return;
    } else {
        if (!confirm('您已完成全部题目，确定提交吗？')) return;
    }

    const btn = document.querySelector('#examActions .btn');
    btn.disabled = true;
    btn.textContent = '评分中...';

    fetch('/api/exam/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ exam_taker: name, answers: userAnswers })
    })
    .then(res => res.json())
    .then(data => {
        btn.disabled = false;
        btn.textContent = '提交答卷';
        if (data.success) { renderExamResult(data); }
        else { alert(data.message || '提交失败'); }
    })
    .catch(() => {
        btn.disabled = false;
        btn.textContent = '提交答卷';
        alert('网络错误，请重试');
    });
}

function renderExamResult(data) {
    document.getElementById('examArea').style.display = 'none';
    document.getElementById('examStats').style.display = 'none';

    const passScore = 70;
    const passed = data.score >= passScore;
    const pct = Math.round(data.correct_count / data.total_questions * 100);

    let html = `
        <div class="result-card">
            <div class="result-header ${passed ? 'result-success' : 'result-error'}">
                <span class="result-icon">${passed ? '🎉' : '😅'}</span>
                <div>
                    <h3>${passed ? '恭喜通过考试！' : '未通过，再接再厉！'}</h3>
                    <p>${data.message}</p>
                </div>
            </div>
            <div class="result-body">
                <div class="score-board">
                    <div class="score-block score-total">
                        <span class="score-num">${data.score}</span>
                        <span class="score-lbl">总得分</span>
                    </div>
                    <div class="score-block score-correct">
                        <span class="score-num">${data.correct_count}</span>
                        <span class="score-lbl">正确</span>
                    </div>
                    <div class="score-block score-wrong">
                        <span class="score-num">${data.total_questions - data.correct_count}</span>
                        <span class="score-lbl">错误</span>
                    </div>
                    <div class="score-block score-rate">
                        <span class="score-num">${pct}%</span>
                        <span class="score-lbl">正确率</span>
                    </div>
                </div>

                <div class="detail-list">
                    <div class="detail-title">答题详情</div>
    `;
    data.details.forEach((d, idx) => {
        const correct = d.is_correct;
        const cardCls = correct ? 'detail-correct' : 'detail-wrong';
        html += `
            <div class="detail-card ${cardCls}">
                <div class="d-header">
                    <span>第 ${idx + 1} 题 ${correct ? '✅' : '❌'}</span>
                    <span>${correct ? '+' + d.score + ' 分' : '0 分'}</span>
                </div>
                <div class="d-question">${d.content}</div>
                <div class="d-answer">
                    <p>你的答案：<span class="${correct ? 'correct' : 'wrong'}">${d.user_answer || '未作答'}</span></p>
                    ${correct ? '' : `<p>正确答案：<span class="correct">${d.correct_answer}</span></p>`}
                </div>
            </div>
        `;
    });
    html += `
                </div>
                <div style="text-align:center; margin-top: 24px;">
                    <button class="btn btn-outline" onclick="resetExam()">重新考试</button>
                </div>
            </div>
        </div>
    `;
    document.getElementById('examResult').innerHTML = html;
    document.getElementById('examResult').style.display = 'block';
    document.getElementById('examResult').scrollIntoView({ behavior: 'smooth' });
}

function resetExam() {
    questions = [];
    userAnswers = {};
    document.getElementById('examArea').style.display = 'none';
    document.getElementById('examResult').style.display = 'none';
    document.getElementById('examStats').style.display = 'none';
    const btn = document.getElementById('btn-start');
    btn.disabled = false;
    btn.textContent = '开始考试';
    document.getElementById('exam_taker').focus();
}
</script>
{% endblock %}
